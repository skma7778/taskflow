<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow – Users</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div id="toast"></div>

<!-- Create User Modal -->
<div class="modal-overlay" id="userModal">
  <div class="modal" style="max-width:440px">
    <div class="modal-title">Create User</div>
    <div class="modal-subtitle">Add a new team member</div>
    <form id="userForm">
      <div class="form-group">
        <label>Full name</label>
        <input type="text" id="uName" placeholder="Jane Smith" required />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="uEmail" placeholder="jane@company.com" required />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="uPassword" placeholder="Min. 6 characters" required minlength="6" />
      </div>
      <div class="form-group">
        <label>Role</label>
        <select id="uRole" required>
          <option value="employee">Employee</option>
          <option value="manager">Manager</option>
          <option value="admin">Admin</option>
        </select>
      </div>
      <div id="uAlert"></div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline" onclick="closeUserModal()">Cancel</button>
        <button type="submit" class="btn btn-primary" id="createBtn">Create User</button>
      </div>
    </form>
  </div>
</div>

<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <header class="topbar">
      <button class="hamburger" id="menuToggle">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
      <div style="flex:1">
        <div class="topbar-title">User Management</div>
        <div class="topbar-subtitle">Admin — manage all team members</div>
      </div>
      <button class="btn btn-primary" onclick="document.getElementById('userModal').classList.add('open')">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
        Add User
      </button>
    </header>
    <main class="page-content">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Email</th>
              <th>Role</th>
              <th>Joined</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="usersBody">
            <tr><td colspan="5" style="text-align:center;padding:40px"><span class="spinner"></span></td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>
</div>

<script type="module">
  import { supabase } from "./supabase.js";
  import { requireAuth, buildSidebar, initMobileMenu, initNotifPopup, roleBadge, formatDate, toast } from "./app.js";

  const user = await requireAuth(["admin"]);
  if (!user) throw new Error();
  buildSidebar(user, "users.html");
  initMobileMenu();
  initNotifPopup(user);

  async function loadUsers() {
    const { data } = await supabase.from("users").select("*").order("created_at", { ascending: false });
    const tbody = document.getElementById("usersBody");

    if (!data?.length) {
      tbody.innerHTML = `<tr><td colspan="5"><div class="empty"><div class="empty-title">No users yet</div></div></td></tr>`;
      return;
    }

    tbody.innerHTML = data.map(u => `
      <tr>
        <td>
          <div style="display:flex;align-items:center;gap:10px">
            <div style="width:34px;height:34px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:13px;flex-shrink:0">${u.name.split(" ").map(w=>w[0]).join("").toUpperCase().slice(0,2)}</div>
            <span style="font-weight:600;color:var(--gray-900)">${u.name}</span>
          </div>
        </td>
        <td style="color:var(--gray-500)">${u.email}</td>
        <td>${roleBadge(u.role)}</td>
        <td style="color:var(--gray-500)">${formatDate(u.created_at)}</td>
        <td>
          ${u.id !== user.id ? `<button class="btn btn-danger btn-sm" onclick="deleteUser('${u.id}','${u.name}')">Delete</button>` : `<span style="font-size:12px;color:var(--gray-400)">You</span>`}
        </td>
      </tr>
    `).join("");
  }

  window.deleteUser = async (id, name) => {
    if (!confirm(`Delete user "${name}"? This cannot be undone.`)) return;
    await supabase.from("users").delete().eq("id", id);
    toast(`${name} removed.`);
    loadUsers();
  };

  window.closeUserModal = () => document.getElementById("userModal").classList.remove("open");

  document.getElementById("userForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const btn = document.getElementById("createBtn");
    btn.disabled = true; btn.innerHTML = `<span class="spinner"></span>`;

    const name     = document.getElementById("uName").value.trim();
    const email    = document.getElementById("uEmail").value.trim();
    const password = document.getElementById("uPassword").value;
    const role     = document.getElementById("uRole").value;

    // Save current admin session before signUp (signUp auto-logs-in new user)
    const { data: { session: adminSession } } = await supabase.auth.getSession();

    const { data, error } = await supabase.auth.signUp({ email, password });
    if (error) {
      document.getElementById("uAlert").innerHTML = `<div class="alert alert-error">${error.message}</div>`;
      btn.disabled = false; btn.textContent = "Create User";
      return;
    }

    if (data.user) {
      await supabase.from("users").upsert({ id: data.user.id, name, email, role });
    }

    // Restore admin session so admin doesn't get logged out
    if (adminSession) {
      await supabase.auth.setSession(adminSession);
    }

    toast(`User ${name} created.`);
    btn.disabled = false; btn.textContent = "Create User";
    closeUserModal();
    loadUsers();
  });

  loadUsers();
</script>
</body>
</html>
