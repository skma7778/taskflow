<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow – Chat</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div id="toast"></div>
<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <header class="topbar">
      <button class="hamburger" id="menuToggle">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
      <div>
        <div class="topbar-title">Direct Chat</div>
        <div class="topbar-subtitle">Private one-on-one messaging with your team</div>
      </div>
    </header>
    <main class="page-content" style="padding-bottom:0">
      <div class="chat-layout">
        <!-- People list -->
        <div class="chat-sidebar">
          <div class="chat-sidebar-header">Team Members</div>
          <div class="chat-list" id="userList">
            <div style="padding:16px;text-align:center"><span class="spinner"></span></div>
          </div>
        </div>
        <!-- Messages -->
        <div class="chat-main" id="chatMain">
          <div class="no-chat">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1"><path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
            <div>Select a person to start chatting</div>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<script type="module">
  import { supabase } from "./supabase.js";
  import { requireAuth, buildSidebar, initMobileMenu, initNotifPopup, showNotifPopup, initials, toast } from "./app.js";

  const user = await requireAuth();
  if (!user) throw new Error();

  buildSidebar(user, "chat.html");
  initMobileMenu();
  initNotifPopup(user);

  let activeReceiverId = null;
  let realtimeChannel  = null;

  // ── Load team members ──────────────────────────────────────
  const { data: members } = await supabase
    .from("users").select("id, name, role").neq("id", user.id).order("name");

  const userList = document.getElementById("userList");
  if (!members?.length) {
    userList.innerHTML = `<div style="padding:16px;color:var(--gray-400);font-size:13px">No team members yet.</div>`;
  } else {
    userList.innerHTML = members.map(m => `
      <div class="chat-item" id="chatItem_${m.id}" onclick="selectUser('${m.id}','${m.name}','${m.role}')">
        <div class="chat-avatar">${initials(m.name)}</div>
        <div class="chat-item-info">
          <div class="chat-item-name">${m.name}</div>
          <div class="chat-item-preview" style="text-transform:capitalize">${m.role}</div>
        </div>
      </div>
    `).join("");
  }

  // ── Select user and open chat ──────────────────────────────
  window.selectUser = async (receiverId, receiverName, receiverRole) => {
    activeReceiverId = receiverId;

    // Highlight active
    document.querySelectorAll(".chat-item").forEach(el => el.classList.remove("active"));
    document.getElementById(`chatItem_${receiverId}`)?.classList.add("active");

    // Render chat window
    document.getElementById("chatMain").innerHTML = `
      <div class="chat-header">
        <div class="chat-avatar" style="width:38px;height:38px;font-size:14px">${initials(receiverName)}</div>
        <div>
          <div style="font-weight:700;font-size:14px;color:var(--gray-900)">${receiverName}</div>
          <div style="font-size:12px;color:var(--gray-500);text-transform:capitalize">${receiverRole}</div>
        </div>
      </div>
      <div class="chat-messages" id="messagesBox"></div>
      <div class="chat-input-area">
        <input type="text" class="chat-input" id="msgInput" placeholder="Type a message…" />
        <button class="btn btn-primary" id="sendBtn" onclick="sendMsg()">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
          Send
        </button>
      </div>
    `;
    document.getElementById("msgInput").addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMsg(); }
    });

    // Unsubscribe from previous channel
    if (realtimeChannel) supabase.removeChannel(realtimeChannel);

    // Subscribe to new messages (Supabase Realtime)
    realtimeChannel = supabase
      .channel(`chat-${[user.id, receiverId].sort().join("-")}`)
      .on("postgres_changes", { event: "INSERT", schema: "public", table: "chat" }, (payload) => {
        const msg = payload.new;
        const isRelevant =
          (msg.sender_id === user.id && msg.receiver_id === receiverId) ||
          (msg.sender_id === receiverId && msg.receiver_id === user.id);
        if (isRelevant) {
          appendMessage(msg);
          // Show popup for incoming messages
          if (msg.sender_id !== user.id) {
            const senderMember = members.find(m => m.id === msg.sender_id);
            showNotifPopup(`${senderMember?.name || "Someone"}: ${msg.message}`, "message");
          }
        }
      })
      .subscribe();

    loadMessages(receiverId);
  };

  // ── Load messages ──────────────────────────────────────────
  async function loadMessages(receiverId) {
    const { data: msgs } = await supabase
      .from("chat")
      .select("*")
      .or(`and(sender_id.eq.${user.id},receiver_id.eq.${receiverId}),and(sender_id.eq.${receiverId},receiver_id.eq.${user.id})`)
      .order("created_at", { ascending: true });

    const box = document.getElementById("messagesBox");
    if (!box) return;
    box.innerHTML = "";
    msgs?.forEach(m => appendMessage(m, false));
    box.scrollTop = box.scrollHeight;
  }

  function appendMessage(msg, scroll = true) {
    const box = document.getElementById("messagesBox");
    if (!box) return;
    const mine = msg.sender_id === user.id;
    const time = new Date(msg.created_at).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });

    const wrapper = document.createElement("div");
    wrapper.className = `msg-wrapper ${mine ? "mine" : "theirs"}`;
    wrapper.innerHTML = `
      <div class="msg-bubble">
        ${msg.message}
        <div class="msg-meta">${time}</div>
      </div>
    `;
    box.appendChild(wrapper);
    if (scroll) box.scrollTop = box.scrollHeight;
  }

  // ── Send message ───────────────────────────────────────────
  window.sendMsg = async () => {
    const input = document.getElementById("msgInput");
    const text  = input?.value.trim();
    if (!text || !activeReceiverId) return;
    input.value = "";

    const { error } = await supabase.from("chat").insert({
      sender_id: user.id, receiver_id: activeReceiverId, message: text
    });
    if (error) toast(error.message, "error");
  };
</script>
</body>
</html>
